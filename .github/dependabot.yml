version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  # Keep Docker image references in workflow files up to date
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    ignore:
      # Ignore major version bumps (review manually)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
