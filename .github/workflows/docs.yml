name: Generate Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**/Chart.yaml"
      - "charts/**/values.yaml"
      - "charts/**/templates/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HELM_DOCS_VERSION: "1.14.2"

jobs:
  generate-docs:
    name: Verify Chart READMEs are up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install helm-docs
        run: |
          cd /tmp
          wget -q https://github.com/norwoodj/helm-docs/releases/download/v${{ env.HELM_DOCS_VERSION }}/helm-docs_${{ env.HELM_DOCS_VERSION }}_Linux_x86_64.tar.gz
          tar -xzf helm-docs_${{ env.HELM_DOCS_VERSION }}_Linux_x86_64.tar.gz
          sudo mv helm-docs /usr/local/bin

      - name: Generate documentation
        run: |
          find charts -type f -name 'Chart.yaml' | xargs dirname | xargs helm-docs

      - name: Check for uncommitted documentation changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Chart README files are out of date. Run 'helm-docs' locally and commit the changes."
            git diff --name-only
            exit 1
          fi
          echo "All chart documentation is up to date."
