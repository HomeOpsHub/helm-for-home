name: Copilot Code Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  request-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip draft PRs — request review once they are marked ready
    if: github.event.pull_request.draft == false
    steps:
      - name: Request Copilot as reviewer
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            -f "reviewers[]=copilot-pull-request-reviewer" \
          || echo "::warning::Could not request Copilot review. Ensure GitHub Copilot code review is enabled for this repository in Settings → Copilot → Code review."
