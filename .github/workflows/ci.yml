name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      changed: ${{ steps.changed.outputs.detected }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Add Helm repositories
        run: bash scripts/add-helm-repos.sh

      - name: Detect changed charts
        id: changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "detected=true" >> "$GITHUB_OUTPUT"
            echo "### Changed Charts" >> "$GITHUB_STEP_SUMMARY"
            echo "$changed" | while read -r chart; do echo "- \`$chart\`"; done >> "$GITHUB_STEP_SUMMARY"
          else
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "No chart changes detected." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Lint changed charts
        if: steps.changed.outputs.detected == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

  test:
    name: Test Charts
    runs-on: ubuntu-latest
    needs: lint
    if: needs.lint.outputs.changed == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Add Helm repositories
        run: bash scripts/add-helm-repos.sh

      - name: Create Kind cluster
        uses: helm/kind-action@v1.14.0

      - name: Install & test changed charts
        run: ct install --target-branch ${{ github.event.repository.default_branch }}
