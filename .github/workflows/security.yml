name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan Charts for Misconfigurations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Build chart dependencies
        run: |
          for chart in charts/stable/* charts/beta/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm dependency build "$chart"
            fi
          done

      - name: Template all charts
        run: |
          mkdir -p .rendered
          for chart in charts/stable/* charts/beta/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              name=$(basename "$chart")
              helm template "$name" "$chart" > ".rendered/${name}.yaml" || {
                echo "WARNING: helm template failed for $chart"
                rm -f ".rendered/${name}.yaml"
              }
            fi
          done

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy config scan on templates
        run: |
          trivy config .rendered \
            --severity CRITICAL,HIGH \
            --exit-code 0

      - name: Run Trivy config scan (SARIF)
        if: always()
        continue-on-error: true
        run: |
          trivy config .rendered \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-results.sarif

      - name: Upload SARIF results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
