name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan Charts for Misconfigurations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.1

      - name: Build chart dependencies
        run: |
          for chart in charts/stable/* charts/beta/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm dependency build "$chart"
            fi
          done

      - name: Template all charts
        run: |
          mkdir -p .rendered
          for chart in charts/stable/* charts/beta/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              name=$(basename "$chart")
              helm template "$name" "$chart" > ".rendered/${name}.yaml" 2>/dev/null || true
            fi
          done

      - name: Run Trivy config scan on templates
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .rendered
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run Trivy config scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .rendered
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
