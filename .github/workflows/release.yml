name: Release Charts

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  HELM_DOCS_VERSION: "1.14.2"

jobs:
  validate:
    name: Validate Charts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Add Helm repositories
        run: bash scripts/add-helm-repos.sh

      - name: Build chart dependencies
        run: |
          for chart in charts/stable/* charts/beta/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm dependency build "$chart"
            fi
          done

      - name: Lint all charts
        run: |
          find charts -type f -name 'Chart.yaml' | xargs dirname | xargs helm lint

  publish:
    name: Package & Publish Charts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    permissions:
      contents: write
      packages: write
    if: (github.event_name == 'push' && contains(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install helm-docs
        run: |
          cd /tmp
          wget -q https://github.com/norwoodj/helm-docs/releases/download/v${{env.HELM_DOCS_VERSION}}/helm-docs_${{env.HELM_DOCS_VERSION}}_Linux_x86_64.tar.gz
          tar -xzf helm-docs_${{env.HELM_DOCS_VERSION}}_Linux_x86_64.tar.gz
          sudo mv helm-docs /usr/local/bin

      - name: Add Helm repositories
        run: bash scripts/add-helm-repos.sh

      - name: Build chart dependencies
        run: |
          for chart in charts/stable/* charts/beta/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm dependency build "$chart"
            fi
          done

      - name: Generate documentation
        run: |
          find charts -type f -name 'Chart.yaml' | xargs dirname | xargs helm-docs

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages
          find charts -type f -name 'Chart.yaml' | xargs dirname | xargs -I {} helm package {} -d .cr-release-packages

      - name: Publish stable charts
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts/stable/
          skip_existing: true
          mark_as_latest: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish beta charts
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts/beta/
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
