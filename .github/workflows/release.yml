name: Release Charts

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  HELM_DOCS_VERSION: "1.14.2"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Install helm-docs
        run: |
          cd /tmp
          wget -q https://github.com/norwoodj/helm-docs/releases/download/v${{ env.HELM_DOCS_VERSION }}/helm-docs_${{ env.HELM_DOCS_VERSION }}_Linux_x86_64.tar.gz
          tar -xzf helm-docs_${{ env.HELM_DOCS_VERSION }}_Linux_x86_64.tar.gz
          sudo mv helm-docs /usr/local/bin

      - name: Add Helm repositories
        run: bash scripts/add-helm-repos.sh

      - name: Build chart dependencies
        run: |
          for chart in charts/stable/* charts/beta/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              helm dependency build "$chart" 2>/dev/null || true
            fi
          done

      - name: Generate chart documentation
        run: find charts -type f -name 'Chart.yaml' | xargs dirname | xargs helm-docs

      - name: Detect changed charts
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          changed=""
          if [[ -n "$BEFORE" ]]; then
            changed=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'charts/**/Chart.yaml' \
              | xargs -I {} dirname {} | sort -u) || true
          fi

          if [[ -n "$changed" ]]; then
            echo "detected=true" >> "$GITHUB_OUTPUT"
            echo "$changed" > /tmp/changed-charts.txt
            echo "### 📋 Charts to Release" >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r chart; do
              name=$(basename "$chart")
              version=$(grep '^version:' "$chart/Chart.yaml" | head -1 | awk '{print $2}')
              echo "- **${name}** \`${version}\`" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$changed"
          else
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "No chart changes detected." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Lint changed charts
        if: steps.changed.outputs.detected == 'true'
        run: |
          while IFS= read -r chart; do
            helm lint "$chart"
          done < /tmp/changed-charts.txt

      - name: Login to GHCR
        if: steps.changed.outputs.detected == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package & publish to GHCR
        if: steps.changed.outputs.detected == 'true'
        run: |
          mkdir -p /tmp/packages
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📦 Published to GHCR" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r chart; do
            if [ -f "$chart/Chart.yaml" ]; then
              name=$(basename "$chart")
              version=$(grep '^version:' "$chart/Chart.yaml" | head -1 | awk '{print $2}')

              helm package "$chart" -d /tmp/packages
              helm push "/tmp/packages/${name}-${version}.tgz" \
                oci://ghcr.io/${{ github.repository_owner }}/charts

              echo "- \`oci://ghcr.io/${{ github.repository_owner }}/charts/${name}:${version}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < /tmp/changed-charts.txt

      - name: Publish stable charts to GitHub Pages
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts/stable/
          skip_existing: true
          mark_as_latest: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish beta charts to GitHub Pages
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts/beta/
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enhance release notes
        if: steps.changed.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r chart; do
            if [ -f "$chart/Chart.yaml" ]; then
              name=$(basename "$chart")
              version=$(grep '^version:' "$chart/Chart.yaml" | head -1 | awk '{print $2}')
              app_version=$(grep '^appVersion:' "$chart/Chart.yaml" | head -1 | awk '{print $2}' | tr -d '"')
              description=$(grep '^description:' "$chart/Chart.yaml" | head -1 | sed 's/^description: *//')
              tag="${name}-${version}"

              cat > /tmp/release-body.md << EOF
          ## ${name}

          ${description}

          | | |
          |---|---|
          | **Chart Version** | \`${version}\` |
          | **App Version** | \`${app_version}\` |

          ### Install from GHCR (OCI)

          \`\`\`bash
          helm install ${name} oci://ghcr.io/${{ github.repository_owner }}/charts/${name} --version ${version}
          \`\`\`

          ### Install from Helm Repository

          \`\`\`bash
          helm repo add helm-for-home https://${{ github.repository_owner }}.github.io/helm-for-home/
          helm install ${name} helm-for-home/${name} --version ${version}
          \`\`\`

          ### Customize

          \`\`\`bash
          helm show values oci://ghcr.io/${{ github.repository_owner }}/charts/${name} --version ${version}
          \`\`\`
          EOF

              gh release edit "$tag" --notes-file /tmp/release-body.md 2>/dev/null || true
            fi
          done < /tmp/changed-charts.txt
