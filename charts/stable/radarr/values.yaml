# Default values for radarr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: linuxserver/radarr
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 1000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: false
  # runAsNonRoot: true
  # runAsUser: 1000

env:
  TZ: "UTC"
  PUID: "1000"
  PGID: "1000"

# Additional environment variables to set on the container
extraEnv: []
# - name: DOCKER_MODS
#   value: "linuxserver/mods:radarr-striptracks"

service:
  type: ClusterIP
  port: 7878

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: radarr.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: radarr-tls
  #    hosts:
  #      - radarr.local

ingressRoute:
  enabled: false
  metadata:
    name: ""
    namespace: ""
    annotations: {}
  spec:
    entrypoints: []
    routes: []
    #  - match: Host(`radarr.example.com`)
    #    kind: Rule
    #    services:
    #      - name: radarr
    #        port: 7878
    #    middlewares: []
    tls:
      enabled: false
      # secretName: ""
      # certResolver: ""
      # domains: []

resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 512Mi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

livenessProbe:
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  config:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi

# Media volumes for movies and downloads directories.
# Each entry creates a volume and volumeMount on the deployment.
# Supports hostPath, existingClaim (PVC), and NFS.
mediaVolumes: []
# - name: movies
#   mountPath: /movies
#   hostPath: /mnt/media/movies
# - name: downloads
#   mountPath: /downloads
#   existingClaim: downloads-pvc
# - name: media
#   mountPath: /media
#   nfs:
#     server: 192.168.1.100
#     path: /export/media

# Additional volumes on the output Deployment definition.
volumes: []
# - name: extra-config
#   configMap:
#     name: my-extra-config

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: extra-config
#   mountPath: /extra
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
