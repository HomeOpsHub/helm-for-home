# Default values for sonarr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: linuxserver/sonarr
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 1000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: false
  # runAsNonRoot: true
  # runAsUser: 1000

env:
  TZ: "UTC"
  PUID: "1000"
  PGID: "1000"
  # Set to "true" to use NVIDIA GPU hardware acceleration
  # DOCKER_MODS: "linuxserver/mods:sonarr-opencl-intel"

# Additional environment variables to set on the container
extraEnv: []
# - name: sonarr_PublishedServerUrl
#   value: "https://sonarr.example.com"

service:
  type: ClusterIP
  port: 8989

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: sonarr.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: sonarr-tls
  #    hosts:
  #      - sonarr.local

ingressRoute:
  enabled: false
  metadata:
    name: ""
    namespace: ""
    annotations: {}
  spec:
    entrypoints: []
    routes: []
    #  - match: Host(`sonarr.example.com`)
    #    kind: Rule
    #    services:
    #      - name: sonarr
    #        port: 8989
    #    middlewares: []
    tls:
      enabled: false
      # secretName: ""
      # certResolver: ""
      # domains: []

resources: {}
  # limits:
  #   cpu: "1"
  #   memory: 1Gi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

livenessProbe:
  httpGet:
    path: /ping
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ping
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  config:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi

# Media library volumes — configure these to mount your media directories.
# Each entry creates a volume + volumeMount in the deployment.
mediaVolumes: []
  # - name: tv
  #   mountPath: /tv
  #   hostPath: /mnt/media/tv              # Option A: hostPath
  #   readOnly: false
  # - name: downloads
  #   mountPath: /downloads
  #   existingClaim: downloads-pvc          # Option B: existing PVC
  #   readOnly: false
  # - name: tv-nfs
  #   mountPath: /tv
  #   nfs:                                  # Option C: NFS
  #     server: 192.168.1.100
  #     path: /export/tv
  #   readOnly: false

# Additional volumes on the output Deployment definition.
volumes: []

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
