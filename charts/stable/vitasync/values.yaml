# Default values for vitasync.
# Override with: helm install vitasync ./charts/stable/vitasync -f my-values.yaml

# -- Global image settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# -- Additional image pull secrets
imagePullSecrets: []

# -- Override the release name
nameOverride: ""
fullnameOverride: ""

# ─────────────────────────────────────────────────────────────────────────────
# API service (Fastify + REST)
# ─────────────────────────────────────────────────────────────────────────────
api:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/homeophub/vitasync-api
    tag: ""        # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3001

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  livenessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Extra environment variables injected directly into the container
  extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"

# ─────────────────────────────────────────────────────────────────────────────
# Worker service (BullMQ background job processor)
# ─────────────────────────────────────────────────────────────────────────────
worker:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/homeophub/vitasync-worker
    tag: ""
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  tolerations: []
  affinity: {}

  extraEnv: []

# ─────────────────────────────────────────────────────────────────────────────
# Web dashboard (Next.js)
# ─────────────────────────────────────────────────────────────────────────────
web:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/homeophub/vitasync-web
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 3

  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false   # Next.js writes .next cache at runtime
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  tolerations: []
  affinity: {}

  extraEnv: []

# ─────────────────────────────────────────────────────────────────────────────
# Database migration Job (pre-install / pre-upgrade hook)
# ─────────────────────────────────────────────────────────────────────────────
migrations:
  enabled: true

  image:
    repository: ghcr.io/homeophub/vitasync-api
    tag: ""
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  # Helm hook annotations — compatible with ArgoCD / Flux
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded

# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL
#
# Set enabled: true  → a PostgreSQL pod is deployed as part of this release.
# Set enabled: false → supply connection details via externalPostgresql below,
#                      or provide a full DATABASE_URL via secrets.existingSecret.
# ─────────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: true

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  auth:
    database: vitasync
    username: vitasync
    # Change in production, or supply via --set or a sealed secret
    password: "changeme"

  service:
    type: ClusterIP
    port: 5432

  resources: {}

  persistence:
    enabled: false
    size: 8Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

# External PostgreSQL — used when postgresql.enabled is false.
# The chart constructs DATABASE_URL as:
#   postgresql://<username>:<password>@<host>:<port>/<database>
externalPostgresql:
  host: "postgresql"
  port: 5432
  database: vitasync
  username: vitasync
  # Leave empty and use secrets.existingSecret for production
  password: ""

# ─────────────────────────────────────────────────────────────────────────────
# Redis
#
# Set enabled: true  → a Redis pod is deployed as part of this release.
# Set enabled: false → supply connection details via externalRedis below,
#                      or provide a full REDIS_URL via secrets.existingSecret.
# ─────────────────────────────────────────────────────────────────────────────
redis:
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  # Redis launch arguments
  command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]

  service:
    type: ClusterIP
    port: 6379

  resources: {}

  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

# External Redis — used when redis.enabled is false.
# Set password if your Redis instance requires AUTH.
# The chart constructs REDIS_URL as:
#   redis://:password@host:port  (with auth)
#   redis://host:port            (no auth)
externalRedis:
  host: "redis"
  port: 6379
  password: ""

# ─────────────────────────────────────────────────────────────────────────────
# Ingress
# ─────────────────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod

  # Two separate virtual hosts: one for the API, one for the web dashboard
  api:
    host: api.vitasync.example.com
    tls: false
    secretName: vitasync-api-tls
  web:
    host: app.vitasync.example.com
    tls: false
    secretName: vitasync-web-tls

# ─────────────────────────────────────────────────────────────────────────────
# Service Account
# ─────────────────────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

# ─────────────────────────────────────────────────────────────────────────────
# Non-sensitive application configuration
# These keys are stored in a ConfigMap and injected as environment variables
# into every application container.
# ─────────────────────────────────────────────────────────────────────────────
config:
  NODE_ENV: "production"
  PORT: "3001"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  # Comma-separated list of allowed CORS origins (e.g. https://app.vitasync.example.com)
  CORS_ORIGINS: ""
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"
  # Base URL the API is publicly reachable at — used to build OAuth callback URLs
  OAUTH_REDIRECT_BASE_URL: ""
  # Public URL of the API that the browser-side Next.js app talks to
  NEXT_PUBLIC_API_URL: ""
  # Slug of the admin workspace auto-created on first boot
  ADMIN_WORKSPACE_SLUG: "default"
  # Database connection pool limits
  DATABASE_POOL_MIN: "2"
  DATABASE_POOL_MAX: "20"

# ─────────────────────────────────────────────────────────────────────────────
# Secrets
#
# Option A (recommended for production):
#   Set existingSecret to the name of a pre-created Kubernetes Secret that
#   contains the keys: DATABASE_URL, REDIS_URL, JWT_SECRET, ENCRYPTION_KEY,
#   ADMIN_API_KEY, and any provider OAuth credentials you need.
#   The chart will not create a Secret in this case.
#
# Option B (dev / homelab):
#   Leave existingSecret empty and fill in the values below.
#   The chart creates a Secret named <release>-secrets from these values.
#   DATABASE_URL and REDIS_URL are automatically computed from the
#   postgresql / externalPostgresql and redis / externalRedis settings above.
#   NEVER commit real secrets to version control.
# ─────────────────────────────────────────────────────────────────────────────
secrets:
  # Name of an existing Secret to use instead of creating one.
  existingSecret: ""

  # Minimum 32 random characters — generate with: openssl rand -hex 32
  JWT_SECRET: "change-me-to-a-long-random-string"
  # 64-char hex string (256-bit key) — generate with: openssl rand -hex 32
  ENCRYPTION_KEY: "change-me-32-byte-hex-encoded-key"
  # Initial admin API key seeded on first boot
  ADMIN_API_KEY: "vs_live_changeme_for_production"

  # Provider OAuth credentials — only the providers you have registered apps for.
  FITBIT_CLIENT_ID: ""
  FITBIT_CLIENT_SECRET: ""
  GARMIN_CONSUMER_KEY: ""
  GARMIN_CONSUMER_SECRET: ""
  WITHINGS_CLIENT_ID: ""
  WITHINGS_CLIENT_SECRET: ""
  POLAR_CLIENT_ID: ""
  POLAR_CLIENT_SECRET: ""
  STRAVA_CLIENT_ID: ""
  STRAVA_CLIENT_SECRET: ""
  WHOOP_CLIENT_ID: ""
  WHOOP_CLIENT_SECRET: ""
