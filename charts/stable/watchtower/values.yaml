replicaCount: 1

image:
  repository: containrrr/watchtower
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

env:
  TZ: "UTC"

extraEnv: []

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: watchtower.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

ingressRoute:
  enabled: false
  metadata:
    name: ""
    namespace: ""
    annotations: {}
  spec:
    entrypoints: []
    routes: []
    tls:
      enabled: false

resources: {}

livenessProbe:
  httpGet:
    path: /v1/update
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /v1/update
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

persistence:
  config:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 100Mi

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
